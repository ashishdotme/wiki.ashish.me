name: Build notes.ashish.me

on:
  push:
    branches:
      - master
    paths-ignore:
      - README.md

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v2
        # We need full history to introspect created/updated:
        with:
          fetch-depth: 0
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run script
        run: deno run -A build.ts
      - name: Commit and push if README changed
        run: |-
          git diff
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add . && git commit -m "chore: update README")
          git push
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
          architecture: "x64"
        env:
          AGENT_TOOLSDIRECTORY: /opt/hostedtoolcache
      - uses: actions/cache@v4
        name: Configure pip caching
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build database
        run: python build_database.py
      - name: Update README
        run: |-
          python build_readme.py --rewrite
          cat readme.md
      - name: Commit and push if README changed
        run: |-
          git pull
          git diff
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add . && git commit -m "chore: update README")
          git push
      - name: Prepare Summary
        run: |-
          if command -v mdbook-summary-tools >/dev/null 2>&1; then
            mdbook-summary-tools generate --book . --config mdbook-summary-tools.toml
          else
            test -f SUMMARY.md
          fi
      - uses: brndnmtthws/rust-action-cargo-binstall@v1
        with:
          packages: mdbook@0.5.2 mdbook-mermaid@0.17.0 mdbook-embedify@0.3.2 mdbook-summary-tools@0.1.0
      - run: mdbook build
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          publish_dir: book
          force_orphan: true
